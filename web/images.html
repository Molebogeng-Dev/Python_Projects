<!DOCTYPE html>
<html lang="en">
<head>
    <title>Google Image Search</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="top-links">
        <a href="index.html">Malebza Search</a>
    </div>

    <div class="container">
        <h1 class="logo">Malebza Images</h1>

        <form action="https://www.google.com/search">
            <input type="hidden" name="tbm" value="isch" >

            <input class="search-bar" type="text" name="q" placeholder="Enter a text of an image">

            <div class="buttons">
                <input type="submit" value="Image Search">
            </div>
        </form>
    </div>

</body>
</html>
